        h1 { color: #f1c40f; margin: 10px 0; text-shadow: 2px 2px 4px black; }
        #gameInfo { font-size: 20px; margin: 10px; color: #f1c40f; font-weight: bold; }
        #board { width: 360px; height: 360px; background: white; margin: 10px auto; position: relative; border: 4px solid #f1c40f; }

        .cell { width: 24px; height: 24px; border: 1px solid #999; position: absolute; background: #eee; }
        .goti { width: 20px; height: 20px; border-radius: 50%; position: absolute; border: 2px solid black; z-index: 100; transition: all 0.3s; }

        .green { background: #27ae60; }
        .yellow { background: #f39c12; }
        .blue { background: #2980b9; }
        .active-goti { box-shadow: 0 0 10px 3px white; cursor: pointer; }
        #controls { margin: 15px; }
        #dice { width: 70px; height: 70px; background: white; color: black; font-size: 40px; line-height: 70px; margin: 10px auto; border-radius: 10px; border: 3px solid #f1c40f; }
        button { padding: 12px 25px; font-size: 16px; background: #f1c40f; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:disabled { background: #555; cursor: not-allowed; }
        #winner { font-size: 26px; color: #2ecc71; margin: 10px; display: none; }
    </style>
</head>
